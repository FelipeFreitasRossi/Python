<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SecureSystem</title>
    <link rel="stylesheet" href="/assets/css/login.css">
    <link rel="stylesheet" href="/assets/css/modal.css">
    <link rel="stylesheet" href="/assets/css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-shield-alt"></i>
                    <h1>SecureSystem</h1>
                </div>
                <p>Faça login para acessar sua conta</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="input-group">
                    <label for="usuario">
                        <i class="fas fa-user"></i>
                        Usuário
                    </label>
                    <input type="text" id="usuario" name="usuario" required 
                           placeholder="Digite seu usuário" autocomplete="username">
                </div>

                <div class="input-group">
                    <label for="senha">
                        <i class="fas fa-lock"></i>
                        Senha
                    </label>
                    <div class="password-input">
                        <input type="password" id="senha" name="senha" required 
                               placeholder="Digite sua senha" autocomplete="current-password">
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('senha')"></i>
                    </div>
                </div>

                <div class="login-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="lembrar">
                        <span>Lembrar-me</span>
                    </label>
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                </div>

                <button type="submit" class="login-btn">
                    <span>Entrar</span>
                    <i class="fas fa-arrow-right"></i>
                </button>

                <div class="login-footer">
                    <p>Não tem uma conta? <a href="/cadastro">Cadastre-se</a></p>
                </div>
            </form>

            <div class="social-login">
                <p>Ou entre com</p>
                <div class="social-buttons">
                    <!-- Instagram -->
                    <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" class="social-link">
                        <button class="social-btn instagram" onclick="loginSocial('instagram')">
                            <i class="fab fa-instagram"></i>
                        </button>
                    </a>
                    
                    <!-- GitHub -->
                    <a href="https://github.com/" target="_blank" rel="noopener noreferrer" class="social-link">
                        <button class="social-btn github" onclick="loginSocial('github')">
                            <i class="fab fa-github"></i>
                        </button>
                    </a>
                </div>
            </div>
        </div>
        <div class="login-footer-links">
            <a href="#">Termos de Uso</a>
            <a href="#">Política de Privacidade</a>
            <a href="#">Suporte</a>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/assets/js/modal.js"></script>
    <script src="/assets/js/login.js"></script>
    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/social-login.js"></script>
</body>
</html>
